<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0f1c;
    color: white;
    margin: 0;
}

/* HEADER */
.header {
    background: #111827;
    padding: 20px;
    text-align: center;
    font-size: 1.5rem;
    font-weight: bold;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* STATS CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.card h3 {
    color: #3b82f6;
    margin-bottom: 10px;
}

/* TABLE */
.table-container {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1f2937;
    padding: 12px;
    text-align: left;
}

td {
    padding: 12px;
    border-bottom: 1px solid #374151;
}

tr:hover {
    background: #1f2937;
}

/* BUTTON */
.delete-btn {
    background: red;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.delete-btn:hover {
    background: darkred;
}
</style>
</head>

<body>

<div class="header">
    📊 Zentrix Booking Dashboard
</div>

<div class="container">

    <!-- STATS -->
    <div class="cards">
        <div class="card">
            <h3>Total Bookings</h3>
            <p id="totalBookings">0</p>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="bookingTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Service</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
