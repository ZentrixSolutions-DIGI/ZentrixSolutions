<!DOCTYPE html>
<html>
<head>
    <title>Zentrix Login</title>

<style>
body {
    font-family: Arial;
    background: #0a0f1c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    background: #111827;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
}

input {
    width: 100%;
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script type="module" src="auth.js"></script>

</body>
</html>
